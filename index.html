<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ร้านตัดผม — บันทึกรายรับ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#F0EDE8;min-height:100vh;padding-bottom:2rem}
:root{
  --cp:#1D9E75;--cpl:#E1F5EE;--cpd:#085041;
  --ct:#378ADD;--ctl:#E6F1FB;--ctd:#0C447C;
  --cta:#D4537E;--ctal:#FBEAF0;--ctad:#72243E;
  --cr:#E24B4A;--crl:#FCEBEB;--crd:#791F1F;
  --bg:#fff;--bg2:#F7F5F0;--text:#1a1a1a;--muted:#666;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --r:10px;--rl:14px
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2c2c2e;--text:#f2f2f7;--muted:#8e8e93;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18)}
  body{background:#111}
}
.app{max-width:430px;margin:0 auto}
.header{background:var(--cp);padding:1rem 1.25rem 0;border-radius:0 0 var(--rl) var(--rl);margin-bottom:1rem;box-shadow:0 2px 12px rgba(29,158,117,0.3)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem}
.month-label{font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:1px;margin-bottom:2px}
.month-name{font-size:18px;font-weight:600;color:#fff}
.nav-arrows{display:flex;gap:8px}
.arrow-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;font-family:'Sarabun',sans-serif}
.tabs{display:flex;gap:4px}
.tab{flex:1;border:none;border-radius:var(--r) var(--r) 0 0;padding:7px 0;font-size:12px;font-weight:500;cursor:pointer;font-family:'Sarabun',sans-serif;transition:.15s}
.tab.active{background:rgba(255,255,255,0.92);color:var(--cp)}
.tab.inactive{background:rgba(255,255,255,0.25);color:#fff}
.page{display:none;padding:0 .625rem}
.page.active{display:block}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:.75rem}
.label{font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:500}
.barber-row{display:flex;gap:8px;margin-bottom:1rem}
.barber-btn{flex:1;padding:10px;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;border:2px solid transparent;transition:.15s}
.svc-list{display:flex;flex-direction:column;gap:6px}
.svc-btn{text-align:left;padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r);background:var(--bg2);cursor:pointer;font-family:'Sarabun',sans-serif;color:var(--text);width:100%;display:flex;justify-content:space-between;align-items:center;transition:.15s}
.svc-btn.selected{background:var(--cpl);border-color:var(--cp)}
.svc-name{font-size:14px;font-weight:500}
.svc-price{font-size:13px;color:var(--muted)}
.svc-share{color:var(--cp);font-weight:500}
.field-label{font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
input[type=date],input[type=number],input[type=text]{width:100%;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);font-family:'Sarabun',sans-serif;outline:none}
input:focus{border-color:var(--cp)}
.selected-box{display:none;background:var(--cpl);border-radius:var(--rl);padding:.875rem 1.25rem;margin-bottom:.75rem}
.qty-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.6);border-radius:var(--r);padding:8px 12px;margin-top:10px}
.qty-label{font-size:13px;color:var(--cpd);font-weight:500}
.qty-ctrl{display:flex;align-items:center;flex:1;justify-content:center}
.qty-btn{width:36px;height:36px;border:1px solid var(--cp);background:#fff;color:var(--cp);font-size:20px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500}
.qty-btn.left{border-radius:var(--r) 0 0 var(--r)}
.qty-btn.right{border-radius:0 var(--r) var(--r) 0}
.qty-num{width:48px;height:36px;border-top:1px solid var(--cp);border-bottom:1px solid var(--cp);background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--cpd)}
.qty-total{text-align:right}
.qty-total-label{font-size:11px;color:var(--cpd)}
.qty-total-val{font-size:16px;font-weight:600;color:var(--cpd)}
.main-btn{width:100%;padding:13px;color:#fff;border:none;border-radius:var(--rl);font-size:16px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;margin-bottom:.5rem;transition:.15s}
.main-btn:disabled{opacity:.45;cursor:not-allowed}
.add-btn{background:var(--cp)}
.wd-btn{background:var(--cr)}
.status{font-size:12px;color:var(--muted);text-align:center;min-height:20px}
.divider{border-top:0.5px solid var(--border);margin:.875rem 0;padding-top:.875rem}
.balance-box{border-radius:var(--r);padding:10px 12px;margin-bottom:1rem}
.balance-box.ok{background:var(--ctl)}
.balance-box.low{background:var(--crl)}
.balance-label{font-size:12px;margin-bottom:2px}
.balance-val{font-size:20px;font-weight:600}
.balance-detail{font-size:11px;margin-top:2px}
.daily-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:.875rem 1.25rem;margin-bottom:.625rem}
.daily-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.daily-date{font-size:14px;font-weight:500}
.daily-count{font-size:13px;color:var(--muted)}
.barber-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px;margin-bottom:8px}
.barber-mini{border-radius:var(--r);padding:8px 10px}
.barber-mini.tobi{background:var(--ctl)}
.barber-mini.tai{background:var(--ctal)}
.barber-mini-name{font-size:11px;margin-bottom:2px}
.barber-mini.tobi .barber-mini-name{color:var(--ctd)}
.barber-mini.tai .barber-mini-name{color:var(--ctad)}
.barber-mini-val{font-size:15px;font-weight:600}
.barber-mini.tobi .barber-mini-val{color:var(--ctd)}
.barber-mini.tai .barber-mini-val{color:var(--ctad)}
.daily-footer{border-top:0.5px solid var(--border);padding-top:8px;display:flex;justify-content:space-between;align-items:center}
.daily-footer-label{font-size:12px;color:var(--muted)}
.daily-footer-val{font-size:13px;font-weight:500;color:var(--cp)}
.daily-footer-sub{color:var(--muted);font-weight:400}
.summary-hero{background:var(--cp);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:.75rem;box-shadow:0 2px 12px rgba(29,158,117,0.3)}
.summary-hero-label{font-size:12px;color:rgba(255,255,255,0.75);margin-bottom:4px}
.summary-hero-val{font-size:28px;font-weight:600;color:#fff}
.summary-hero-sub{font-size:12px;color:rgba(255,255,255,0.65);margin-top:4px}
.summary-hero-diff{font-size:13px;color:rgba(255,255,255,.9);margin-top:8px}
.barber-summary-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px;margin-bottom:.75rem}
.barber-summary-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:.875rem 1rem}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:13px;font-weight:600}
.avatar.tobi{background:var(--ctl);color:var(--ctd)}
.avatar.tai{background:var(--ctal);color:var(--ctad)}
.bs-name{font-size:12px;color:var(--muted)}
.bs-val{font-size:18px;font-weight:600;margin:2px 0}
.bs-val.tobi{color:var(--ctd)}
.bs-val.tai{color:var(--ctad)}
.bs-divider{border-top:0.5px solid var(--border);margin-top:8px;padding-top:8px}
.bs-wd-label{font-size:11px;color:var(--muted)}
.bs-wd-val{font-size:14px;font-weight:500;color:var(--cr);margin-top:1px}
.bs-remain{font-size:12px;font-weight:500;margin-top:2px}
.bs-remain.tobi{color:var(--ctd)}
.bs-remain.tai{color:var(--ctad)}
.ratio-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:.875rem 1.25rem;margin-bottom:.75rem}
.ratio-bar{height:12px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:8px}
.ratio-tobi{background:var(--ct)}
.ratio-tai{flex:1;background:var(--cta)}
.ratio-labels{display:flex;gap:16px;font-size:12px}
.top-svc-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:.875rem 1.25rem}
.top-svc-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.top-svc-item+.top-svc-item{border-top:0.5px solid var(--border)}
.top-svc-name{font-size:13px}
.top-svc-cnt{font-size:13px;font-weight:500;color:var(--cp)}
.wd-history-item{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.wd-date{font-size:13px;font-weight:500}
.wd-note{font-size:12px;color:var(--muted)}
.wd-amount{font-size:15px;font-weight:600;color:var(--cr)}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="month-label">ร้านตัดผม</div>
        <div class="month-name" id="header-month">—</div>
      </div>
      <div class="nav-arrows">
        <button class="arrow-btn" onclick="changeMonth(-1)">‹</button>
        <button class="arrow-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab" id="tab-add" onclick="showPage('add')">+ บันทึก</button>
      <button class="tab" id="tab-withdraw" onclick="showPage('withdraw')">เบิกเงิน</button>
      <button class="tab" id="tab-daily" onclick="showPage('daily')">รายวัน</button>
      <button class="tab" id="tab-summary" onclick="showPage('summary')">สรุป</button>
    </div>
  </div>

  <!-- ADD PAGE -->
  <div class="page" id="page-add">
    <div class="card">
      <div class="label">ช่างที่ให้บริการ</div>
      <div class="barber-row">
        <button class="barber-btn" id="btn-tobi" onclick="selectBarber('tobi')">โทบิ</button>
        <button class="barber-btn" id="btn-tai" onclick="selectBarber('tai')">ต่าย</button>
      </div>
      <div class="label">เลือกบริการ</div>
      <div class="svc-list" id="service-list"></div>
      <div class="divider">
        <div class="field-label">วันที่</div>
        <input type="date" id="entry-date">
      </div>
    </div>

    <div class="selected-box" id="selected-info">
      <div style="font-size:12px;color:var(--cpd);margin-bottom:4px">รายการที่เลือก</div>
      <div style="font-size:16px;font-weight:600;color:var(--cpd)" id="selected-name">—</div>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <span style="font-size:13px;color:var(--cpd)">ราคา: <b id="selected-price">0</b> บาท</span>
        <span style="font-size:13px;color:var(--cpd)">ช่างได้/คน: <b id="selected-share">0</b> บาท</span>
      </div>
      <div class="qty-row">
        <span class="qty-label">จำนวน</span>
        <div class="qty-ctrl">
          <button class="qty-btn left" onclick="changeQty(-1)">−</button>
          <div class="qty-num" id="qty-display">1</div>
          <button class="qty-btn right" onclick="changeQty(1)">+</button>
        </div>
        <div class="qty-total">
          <div class="qty-total-label">รวม</div>
          <div class="qty-total-val" id="total-share-preview">0 ฿</div>
        </div>
      </div>
    </div>

    <button class="main-btn add-btn" id="add-btn" onclick="addEntry()" disabled>บันทึกรายการ</button>
    <div class="status" id="add-status"></div>
  </div>

  <!-- WITHDRAW PAGE -->
  <div class="page" id="page-withdraw">
    <div class="card">
      <div class="label">ช่างที่เบิกเงิน</div>
      <div class="barber-row">
        <button class="barber-btn" id="wbtn-tobi" onclick="selectWbarber('tobi')">โทบิ</button>
        <button class="barber-btn" id="wbtn-tai" onclick="selectWbarber('tai')">ต่าย</button>
      </div>
      <div class="balance-box ok" id="balance-preview">
        <div class="balance-label" id="balance-label" style="color:var(--ctd)">ยอดคงเหลือเดือนนี้</div>
        <div class="balance-val" id="barber-balance" style="color:var(--ctd)">0 ฿</div>
        <div class="balance-detail" id="barber-balance-detail" style="color:var(--ctd)">รายได้ 0฿ − เบิกแล้ว 0฿</div>
      </div>
      <div class="field-label">จำนวนเงินที่เบิก (บาท)</div>
      <input type="number" id="withdraw-amount" placeholder="เช่น 500" min="1" style="margin-bottom:.875rem">
      <div class="field-label">วันที่</div>
      <input type="date" id="withdraw-date" style="margin-bottom:.875rem">
      <div class="field-label">หมายเหตุ (ไม่บังคับ)</div>
      <input type="text" id="withdraw-note" placeholder="เช่น เบิกค่าแชมพู">
    </div>
    <button class="main-btn wd-btn" onclick="addWithdraw()">บันทึกการเบิกเงิน</button>
    <div class="status" id="withdraw-status"></div>
    <div id="withdraw-history" style="margin-top:.75rem"></div>
  </div>

  <!-- DAILY PAGE -->
  <div class="page" id="page-daily">
    <div id="daily-content"></div>
  </div>

  <!-- SUMMARY PAGE -->
  <div class="page" id="page-summary">
    <div id="summary-content"></div>
  </div>
</div>

<script>
const SERVICES=[
  {id:'cut',name:'ตัดผม',price:160,pct:.5},
  {id:'cut_wash',name:'ตัดสระ',price:250,pct:.5},
  {id:'cut_wash_treat',name:'ตัดสระ+ทรีทเม้นท์',price:350,special:true,base:250,pct_base:.5,pct_extra:.35},
  {id:'kid',name:'ตัดเด็ก',price:120,pct:.5},
  {id:'color',name:'ทำสี',price:450,pct:.35},
  {id:'cut_color',name:'ตัด+ทำสี',price:600,pct:.35},
  {id:'perm',name:'ดัดผม (โปร)',price:890,real:1200,pct:.37}
];
const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

let st={barber:'tobi',wbarber:'tobi',svc:null,qty:1,viewY:new Date().getFullYear(),viewM:new Date().getMonth(),entries:[],withdrawals:[]};

function calcShare(s){
  if(s.special)return Math.round(s.base*s.pct_base+(s.price-s.base)*s.pct_extra);
  return Math.round(s.price*s.pct);
}
function fmt(n){return Math.round(n).toLocaleString('th-TH');}
function save(){localStorage.setItem('hair_entries_v2',JSON.stringify(st.entries));localStorage.setItem('hair_withdrawals_v2',JSON.stringify(st.withdrawals));}
function load(){
  try{const e=localStorage.getItem('hair_entries_v2');if(e)st.entries=JSON.parse(e);}catch(e){}
  try{const w=localStorage.getItem('hair_withdrawals_v2');if(w)st.withdrawals=JSON.parse(w);}catch(e){}
}

function selectBarber(b){
  st.barber=b;
  const ti=document.getElementById('btn-tobi');
  const ta=document.getElementById('btn-tai');
  ti.style.background=b==='tobi'?'var(--ct)':'transparent';
  ti.style.color=b==='tobi'?'#fff':'var(--muted)';
  ti.style.borderColor=b==='tobi'?'var(--ct)':'var(--border2)';
  ta.style.background=b==='tai'?'var(--cta)':'transparent';
  ta.style.color=b==='tai'?'#fff':'var(--muted)';
  ta.style.borderColor=b==='tai'?'var(--cta)':'var(--border2)';
}

function selectWbarber(b){
  st.wbarber=b;
  const ti=document.getElementById('wbtn-tobi');
  const ta=document.getElementById('wbtn-tai');
  ti.style.background=b==='tobi'?'var(--ct)':'transparent';
  ti.style.color=b==='tobi'?'#fff':'var(--muted)';
  ti.style.borderColor=b==='tobi'?'var(--ct)':'var(--border2)';
  ta.style.background=b==='tai'?'var(--cta)':'transparent';
  ta.style.color=b==='tai'?'#fff':'var(--muted)';
  ta.style.borderColor=b==='tai'?'var(--cta)':'var(--border2)';
  updateBalancePreview();
}

function getMonthEntries(y,m){return st.entries.filter(e=>{const d=new Date(e.date);return d.getFullYear()===y&&d.getMonth()===m;});}
function getMonthWds(y,m){return st.withdrawals.filter(w=>{const d=new Date(w.date);return d.getFullYear()===y&&d.getMonth()===m;});}

function updateBalancePreview(){
  const earned=getMonthEntries(st.viewY,st.viewM).filter(e=>e.barber===st.wbarber).reduce((s,e)=>s+e.share,0);
  const withdrawn=getMonthWds(st.viewY,st.viewM).filter(w=>w.barber===st.wbarber).reduce((s,w)=>s+w.amount,0);
  const bal=earned-withdrawn;
  const bx=document.getElementById('balance-preview');
  const lbl=document.getElementById('balance-label');
  const bv=document.getElementById('barber-balance');
  const bd=document.getElementById('barber-balance-detail');
  const ok=bal>=0;
  bx.style.background=ok?'var(--ctl)':'var(--crl)';
  lbl.style.color=ok?'var(--ctd)':'var(--crd)';
  bv.style.color=ok?'var(--ctd)':'var(--crd)';
  bd.style.color=ok?'var(--ctd)':'var(--crd)';
  bv.textContent=fmt(bal)+' ฿';
  bd.textContent=`รายได้ ${fmt(earned)}฿ − เบิกแล้ว ${fmt(withdrawn)}฿`;
}

function changeQty(d){
  st.qty=Math.max(1,Math.min(99,st.qty+d));
  document.getElementById('qty-display').textContent=st.qty;
  if(st.svc)document.getElementById('total-share-preview').textContent=fmt(calcShare(st.svc)*st.qty)+' ฿';
}

function selectService(svc){
  st.svc=svc;
  document.querySelectorAll('.svc-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('svc-'+svc.id).classList.add('selected');
  const share=calcShare(svc);
  document.getElementById('selected-name').textContent=svc.name;
  document.getElementById('selected-price').textContent=svc.price;
  document.getElementById('selected-share').textContent=share;
  document.getElementById('total-share-preview').textContent=fmt(share*st.qty)+' ฿';
  document.getElementById('selected-info').style.display='block';
  document.getElementById('add-btn').disabled=false;
}

function renderServices(){
  const el=document.getElementById('service-list');
  el.innerHTML='';
  SERVICES.forEach(svc=>{
    const share=calcShare(svc);
    const btn=document.createElement('button');
    btn.className='svc-btn';
    btn.id='svc-'+svc.id;
    btn.innerHTML=`<span class="svc-name">${svc.name}${svc.real?` <span style="font-size:11px;color:var(--muted);text-decoration:line-through">${svc.real}฿</span>`:''}</span><span class="svc-price">${svc.price}฿ <span class="svc-share">(${share}฿)</span></span>`;
    btn.onclick=()=>selectService(svc);
    el.appendChild(btn);
  });
}

async function addEntry(){
  if(!st.svc)return;
  const dateVal=document.getElementById('entry-date').value;
  if(!dateVal){document.getElementById('add-status').textContent='กรุณาเลือกวันที่';return;}
  const share=calcShare(st.svc);
  for(let i=0;i<st.qty;i++)st.entries.push({id:Date.now()+i,barber:st.barber,serviceId:st.svc.id,serviceName:st.svc.name,price:st.svc.price,share,date:dateVal});
  save();
  document.getElementById('add-status').textContent=`✓ บันทึก ${st.qty} รายการแล้ว!`;
  setTimeout(()=>document.getElementById('add-status').textContent='',2500);
  st.svc=null;st.qty=1;
  document.querySelectorAll('.svc-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('selected-info').style.display='none';
  document.getElementById('qty-display').textContent='1';
  document.getElementById('add-btn').disabled=true;
}

async function addWithdraw(){
  const amt=parseFloat(document.getElementById('withdraw-amount').value);
  const dateVal=document.getElementById('withdraw-date').value;
  const note=document.getElementById('withdraw-note').value.trim();
  if(!amt||amt<=0){document.getElementById('withdraw-status').textContent='กรุณาใส่จำนวนเงิน';return;}
  if(!dateVal){document.getElementById('withdraw-status').textContent='กรุณาเลือกวันที่';return;}
  st.withdrawals.push({id:Date.now(),barber:st.wbarber,amount:Math.round(amt),date:dateVal,note});
  save();
  document.getElementById('withdraw-amount').value='';
  document.getElementById('withdraw-note').value='';
  document.getElementById('withdraw-status').textContent='✓ บันทึกการเบิกเงินแล้ว!';
  setTimeout(()=>document.getElementById('withdraw-status').textContent='',2500);
  updateBalancePreview();
  renderWdHistory();
}

function renderWdHistory(){
  const wds=getMonthWds(st.viewY,st.viewM).filter(w=>w.barber===st.wbarber).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const el=document.getElementById('withdraw-history');
  if(!wds.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="label">ประวัติเบิกเงินเดือนนี้</div>`+wds.map(w=>{
    const d=new Date(w.date);
    return `<div class="wd-history-item"><div><div class="wd-date">${d.getDate()} ${MONTHS[d.getMonth()]}</div>${w.note?`<div class="wd-note">${w.note}</div>`:''}</div><div class="wd-amount">−${fmt(w.amount)}฿</div></div>`;
  }).join('');
}

function renderDaily(){
  const entries=getMonthEntries(st.viewY,st.viewM);
  const byDay={};
  entries.forEach(e=>{if(!byDay[e.date])byDay[e.date]={tobi:[],tai:[]};byDay[e.date][e.barber].push(e);});
  const days=Object.keys(byDay).sort().reverse();
  const el=document.getElementById('daily-content');
  if(!days.length){el.innerHTML='<div class="empty">ยังไม่มีรายการในเดือนนี้</div>';return;}
  el.innerHTML=days.map(date=>{
    const d=new Date(date);
    const dayStr=`${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()+543}`;
    const tobi=byDay[date].tobi,tai=byDay[date].tai,all=[...tobi,...tai];
    const totP=all.reduce((s,e)=>s+e.price,0),totS=all.reduce((s,e)=>s+e.share,0);
    const tobiS=tobi.reduce((s,e)=>s+e.share,0),taiS=tai.reduce((s,e)=>s+e.share,0);
    return `<div class="daily-card">
      <div class="daily-header"><div class="daily-date">${dayStr}</div><div class="daily-count">${all.length} รายการ</div></div>
      <div class="barber-grid">
        <div class="barber-mini tobi"><div class="barber-mini-name">โทบิ (${tobi.length})</div><div class="barber-mini-val">${fmt(tobiS)}฿</div></div>
        <div class="barber-mini tai"><div class="barber-mini-name">ต่าย (${tai.length})</div><div class="barber-mini-val">${fmt(taiS)}฿</div></div>
      </div>
      <div class="daily-footer">
        <span class="daily-footer-label">รวมทั้งวัน</span>
        <span class="daily-footer-val">${fmt(totS)}฿ <span class="daily-footer-sub">(รับ ${fmt(totP)}฿)</span></span>
      </div>
    </div>`;
  }).join('');
}

function renderSummary(){
  const entries=getMonthEntries(st.viewY,st.viewM);
  const wds=getMonthWds(st.viewY,st.viewM);
  const prevM=st.viewM===0?11:st.viewM-1,prevY=st.viewM===0?st.viewY-1:st.viewY;
  const prevEntries=getMonthEntries(prevY,prevM);
  const totP=entries.reduce((s,e)=>s+e.price,0),totS=entries.reduce((s,e)=>s+e.share,0);
  const tobiS=entries.filter(e=>e.barber==='tobi').reduce((s,e)=>s+e.share,0);
  const taiS=entries.filter(e=>e.barber==='tai').reduce((s,e)=>s+e.share,0);
  const tobiC=entries.filter(e=>e.barber==='tobi').length,taiC=entries.filter(e=>e.barber==='tai').length;
  const tobiW=wds.filter(w=>w.barber==='tobi').reduce((s,w)=>s+w.amount,0);
  const taiW=wds.filter(w=>w.barber==='tai').reduce((s,w)=>s+w.amount,0);
  const prevS=prevEntries.reduce((s,e)=>s+e.share,0);
  const diff=prevS>0?Math.round((totS-prevS)/prevS*100):null;
  const diffStr=diff===null?'ไม่มีข้อมูลเดือนก่อน':diff>=0?`▲ +${diff}% จากเดือนก่อน`:`▼ ${diff}% จากเดือนก่อน`;
  const svcCount={};entries.forEach(e=>{svcCount[e.serviceName]=(svcCount[e.serviceName]||0)+1;});
  const topSvc=Object.entries(svcCount).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const el=document.getElementById('summary-content');
  el.innerHTML=`
    <div class="summary-hero">
      <div class="summary-hero-label">รายรับช่างรวม (${MONTHS[st.viewM]} ${st.viewY+543})</div>
      <div class="summary-hero-val">${fmt(totS)}฿</div>
      <div class="summary-hero-sub">รายรับร้าน: ${fmt(totP)}฿ · ${entries.length} รายการ</div>
      <div class="summary-hero-diff">${diffStr}</div>
    </div>
    <div class="barber-summary-grid">
      <div class="barber-summary-card">
        <div class="avatar tobi">ท</div>
        <div class="bs-name">โทบิ · ${tobiC} รายการ</div>
        <div class="bs-val tobi">${fmt(tobiS)}฿</div>
        <div class="bs-divider">
          <div class="bs-wd-label">เบิกแล้ว</div>
          <div class="bs-wd-val">−${fmt(tobiW)}฿</div>
          <div class="bs-remain tobi">คงเหลือ ${fmt(tobiS-tobiW)}฿</div>
        </div>
      </div>
      <div class="barber-summary-card">
        <div class="avatar tai">ต</div>
        <div class="bs-name">ต่าย · ${taiC} รายการ</div>
        <div class="bs-val tai">${fmt(taiS)}฿</div>
        <div class="bs-divider">
          <div class="bs-wd-label">เบิกแล้ว</div>
          <div class="bs-wd-val">−${fmt(taiW)}฿</div>
          <div class="bs-remain tai">คงเหลือ ${fmt(taiS-taiW)}฿</div>
        </div>
      </div>
    </div>
    ${totS>0?`<div class="ratio-card">
      <div class="label" style="margin-bottom:10px">สัดส่วนรายรับช่าง</div>
      <div class="ratio-bar"><div class="ratio-tobi" style="width:${Math.round(tobiS/totS*100)}%"></div><div class="ratio-tai"></div></div>
      <div class="ratio-labels"><span style="color:var(--ctd)">โทบิ ${Math.round(tobiS/totS*100)}%</span><span style="color:var(--ctad)">ต่าย ${Math.round(taiS/totS*100)}%</span></div>
    </div>`:''}
    ${topSvc.length?`<div class="top-svc-card">
      <div class="label" style="margin-bottom:10px">บริการยอดนิยม</div>
      ${topSvc.map(([name,cnt])=>`<div class="top-svc-item"><span class="top-svc-name">${name}</span><span class="top-svc-cnt">${cnt} ครั้ง</span></div>`).join('')}
    </div>`:''}
  `;
}

function changeMonth(dir){
  st.viewM+=dir;
  if(st.viewM>11){st.viewM=0;st.viewY++;}
  if(st.viewM<0){st.viewM=11;st.viewY--;}
  updateHeader();
  const cur=['add','withdraw','daily','summary'].find(p=>document.getElementById('page-'+p).classList.contains('active'))||'add';
  if(cur==='daily')renderDaily();
  else if(cur==='summary')renderSummary();
  else if(cur==='withdraw'){updateBalancePreview();renderWdHistory();}
}

function updateHeader(){
  document.getElementById('header-month').textContent=MONTHS[st.viewM]+' '+(st.viewY+543);
}

function showPage(p){
  ['add','withdraw','daily','summary'].forEach(pg=>{
    document.getElementById('page-'+pg).classList.toggle('active',pg===p);
    const t=document.getElementById('tab-'+pg);
    t.className='tab '+(pg===p?'active':'inactive');
  });
  if(p==='daily')renderDaily();
  else if(p==='summary')renderSummary();
  else if(p==='withdraw'){updateBalancePreview();renderWdHistory();}
}

function init(){
  load();
  const t=new Date();
  const y=t.getFullYear(),m=String(t.getMonth()+1).padStart(2,'0'),d=String(t.getDate()).padStart(2,'0');
  document.getElementById('entry-date').value=`${y}-${m}-${d}`;
  document.getElementById('withdraw-date').value=`${y}-${m}-${d}`;
  selectBarber('tobi');selectWbarber('tobi');
  renderServices();updateHeader();showPage('add');
}
init();
</script>
</body>
</html>
